<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TB-AMR-MTBC-Phylogenomics Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e5e7eb; --card:#ffffff; --chip:#f1f5f9; --accent:#0ea5e9;
      --shadow:0 1px 2px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.04)
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0b1220; --ink:#e5e7eb; --muted:#94a3b8; --line:#1f2937; --card:#0f172a; --chip:#111827; --accent:#38bdf8; --shadow:none }
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial}

    .wrap{max-width:1100px;margin:auto;padding:28px 20px}

    header{
      display:flex;gap:16px;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:20px
    }

    .brand h1{margin:0;font-size:24px}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:14px}

    .btn{
      display:inline-flex;align-items:center;gap:8px;padding:10px 14px;
      border:1px solid var(--line);border-radius:10px;text-decoration:none;
      color:var(--ink);background:var(--card);cursor:pointer
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
      margin-top:14px
    }

    .card{
      display:block;text-decoration:none;color:inherit;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--card);
      padding:18px;
      transition:.1s ease
    }

    .card:hover{transform:translateY(-2px);border-color:var(--accent)}

    .icon img{
      width:40px;height:40px;border-radius:8px;
      border:1px solid var(--line)
    }

    .title{
      margin:10px 0 6px;
      font-weight:700;
      font-size:20px
    }

    .chip{
      font-size:13px;
      background:var(--chip);
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--line)
    }

  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="brand">
        <h1>TB-AMR-MTBC-Phylogenomics Reports</h1>
        <p><strong>Interactive HTML outputs for TB AMR and phylogenomics analysis</strong></p>
      </div>
    </header>

    <div id="cards" class="grid">

      <!-- Batch 1 -->
      <a class="card"
         href="./reports/mtbc_training_2026.html"
         data-name="mtbc tuberculosis amr phylogenomics training 2026 batch1">

        <div class="icon">
          <img id="mtb-img-1"
               src="assets/Mycobacterium_tuberculosis.png"
               loading="lazy">
        </div>

        <div class="title">
          Mycobacterium tuberculosis — Training dataset (May 2026, Batch 1)
        </div>

        <div class="chip">
          TB AMR + Phylogenomics
        </div>
      </a>

      <!-- Batch 2 -->
      <a class="card"
         href="./reports/Mycobacterium_tuberculosis_report.html"
         data-name="mtbc tuberculosis amr phylogenomics training 2026 batch2">

        <div class="icon">
          <img id="mtb-img-2"
               src="assets/Mycobacterium_tuberculosis.png"
               loading="lazy">
        </div>

        <div class="title">
          Mycobacterium tuberculosis — Training dataset (May 2026, Batch 2)
        </div>

        <div class="chip">
          TB AMR + Phylogenomics
        </div>
      </a>

    </div>

  </div>

  <script>
    function setupFallback(id, candidates) {
      const img = document.getElementById(id);
      if (!img) return;
      let i = 0;
      img.onerror = () => {
        i++;
        if (i < candidates.length) img.src = candidates[i];
      };
    }

    setupFallback('mtb-img-1', [
      'assets/Mycobacterium_tuberculosis.png'
    ]);

    setupFallback('mtb-img-2', [
      'assets/Mycobacterium_tuberculosis.png'
    ]);
  </script>

</body>
</html>
